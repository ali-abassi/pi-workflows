name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: python -m venv .venv
      - run: .venv/bin/python -m pip install 'PyYAML>=6,<7' 'ruamel.yaml>=0.18,<0.19'
      - run: npm ci --ignore-scripts
      - run: npm test
      - run: npm run check
      - run: ./bin/piw schema --json | jq -e '."x-pi-workflows".nodeKinds | length == 5'
      - run: PI_WORKFLOWS_ROOTS="$PWD/examples" ./bin/piw validate examples/hello/steps.yaml
      - run: PI_WORKFLOWS_ROOTS="$PWD/examples" ./bin/piw run examples/hello/steps.yaml --input Ada
