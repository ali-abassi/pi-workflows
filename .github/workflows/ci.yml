name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: python -m venv .venv
      - run: .venv/bin/python -m pip install -r requirements.txt
      - run: npm ci --ignore-scripts

      - name: Unit tests and Pi extension tests
        run: npm test
      - name: Typecheck the Pi extension
        run: npm run check
      - name: Validate every shipped example
        run: npm run test:examples

      - name: Schema exposes the full node contract
        run: ./bin/piw schema --json | jq -e '."x-pi-workflows".nodeKinds | length == 5'
      - name: Validate a workflow
        run: PI_WORKFLOWS_ROOTS="$PWD/examples/workflows" ./bin/piw validate examples/workflows/01-hello-command/steps.yaml
      - name: Run a workflow end to end
        run: PI_WORKFLOWS_ROOTS="$PWD/examples/workflows" ./bin/piw run examples/workflows/01-hello-command/steps.yaml --input Ada

      - name: A missing required input fails with an actionable message
        run: |
          set +e
          output=$(PI_WORKFLOWS_ROOTS="$PWD/examples/workflows" ./bin/piw run examples/workflows/01-hello-command/steps.yaml --json 2>&1)
          set -e
          echo "$output"
          echo "$output" | grep -q 'requires --input' || {
            echo "::error::runner error message was swallowed"; exit 1; }

      - name: Studio rejects a rebound Host header
        run: .venv/bin/python -m unittest tests.test_workflow_ui -v
